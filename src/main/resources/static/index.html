<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-container">
    <div class="auth-brand">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4"/>
          <rect x="3" y="4" width="18" height="18" rx="3"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
        </svg>
      </div>
      <div>
        <h1 class="auth-title">Task Manager</h1>
        <p class="auth-subtitle">Organize. Execute. Entregue.</p>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Criar conta</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login" class="auth-form">
        <div class="field-group">
          <label class="field-label">E-mail</label>
          <input type="email" id="login-email" class="field-input" placeholder="seu@email.com" />
        </div>
        <div class="field-group">
          <label class="field-label">Senha</label>
          <input type="password" id="login-password" class="field-input" placeholder="••••••••" />
        </div>
        <div id="login-error" class="auth-error hidden"></div>
        <button class="btn-primary full" onclick="handleLogin()">Entrar</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" class="auth-form hidden">
        <div class="field-group">
          <label class="field-label">Nome</label>
          <input type="text" id="reg-name" class="field-input" placeholder="Seu nome" />
        </div>
        <div class="field-group">
          <label class="field-label">E-mail</label>
          <input type="email" id="reg-email" class="field-input" placeholder="seu@email.com" />
        </div>
        <div class="field-group">
          <label class="field-label">Senha</label>
          <input type="password" id="reg-password" class="field-input" placeholder="Mínimo 6 caracteres" />
        </div>
        <div id="reg-error" class="auth-error hidden"></div>
        <button class="btn-primary full" onclick="handleRegister()">Criar conta</button>
      </div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="hidden">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12l2 2 4-4"/>
            <rect x="3" y="4" width="18" height="18" rx="3"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
          </svg>
        </div>
        <span class="sidebar-brand-name">TaskManager</span>
        <!-- MOBILE NAV -->
        <nav class="mobile-nav">
          <button class="mobile-nav-item active" onclick="setView('all', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Todas
          </button>
          <button class="mobile-nav-item" onclick="setView('PENDING', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Pendentes
          </button>
          <button class="mobile-nav-item" onclick="setView('IN_PROGRESS', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Progresso
          </button>
          <button class="mobile-nav-item" onclick="setView('COMPLETED', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Concluídas
          </button>
        </nav>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="setView('all', this)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Todas as tarefas</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" onclick="setView('PENDING', this)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Pendentes</span>
          <span class="nav-count" id="count-pending">0</span>
        </button>
        <button class="nav-item" onclick="setView('IN_PROGRESS', this)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span>Em progresso</span>
          <span class="nav-count" id="count-progress">0</span>
        </button>
        <button class="nav-item" onclick="setView('COMPLETED', this)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Concluídas</span>
          <span class="nav-count" id="count-done">0</span>
        </button>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
        <svg id="icon-moon" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" class="nav-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span>Alternar tema</span>
      </button>
      <button class="logout-btn" onclick="handleLogout()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <h2 class="main-title" id="view-title">Todas as tarefas</h2>
        <p class="main-subtitle" id="view-subtitle">Gerencie todas as suas tarefas</p>
      </div>
      <button class="btn-primary fab" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nova tarefa
      </button>
    </div>

    <div id="tasks-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Carregando tarefas...</span>
      </div>
    </div>
  </main>
</div>

<!-- MODAL NOVA TAREFA -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title-text">Nova tarefa</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-task-id" value="" />
      <div class="field-group">
        <label class="field-label">Título <span class="required">*</span></label>
        <input type="text" id="modal-title" class="field-input" placeholder="O que precisa ser feito?" />
      </div>
      <div class="field-group">
        <label class="field-label">Descrição</label>
        <textarea id="modal-desc" class="field-input field-textarea" placeholder="Detalhes opcionais..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Status</label>
        <select id="modal-status" class="field-input">
          <option value="PENDING">Pendente</option>
          <option value="IN_PROGRESS">Em progresso</option>
          <option value="COMPLETED">Concluída</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveTask()">Salvar tarefa</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/tasks.js"></script>
<script src="js/app.js"></script>
</body>
</html>
